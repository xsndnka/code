<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ค้นหาพี่รหัส</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}
input{
    padding: 10px;
    font-size: 20px;
}
button{
    padding: 10px 20px;
    font-size: 20px;
}
#result{
    margin-top: 20px;
    font-size: 24px;
    font-weight: bold;
}
</style>
</head>
<body>

<h1>กรอกรหัส 6 หลัก</h1>

<input type="password" id="code" maxlength="6" placeholder="******">
<button onclick="checkCode()">ยืนยัน</button>

<div id="result"></div>

<script>
function checkCode() {
    const code = document.getElementById("code").value;

    if (code === "576125") {
        document.getElementById("result").innerHTML = "Ig:me._.1093";
    } else {
        document.getElementById("result").innerHTML = "รหัสไม่ถูกต้อง";
    }
}
</script>

</body>
</html>
